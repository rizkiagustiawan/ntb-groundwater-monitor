services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ntb_groundwater
      POSTGRES_USER: rizki
      POSTGRES_PASSWORD: ntb_env_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rizki -d ntb_groundwater"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://rizki:ntb_env_2024@db:5432/ntb_groundwater
      KIMI_API_KEY: ${KIMI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/proxy.conf:/etc/nginx/conf.d/proxy.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
